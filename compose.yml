services:
  yams:
    image: momokabil/yams:latest
    # Uncomment the line below (and remove or comment image:) to build from source instead.
    # build: .
    ports:
      # YAMS web UI — set YAMS_PORT in your .env to change the host port.
      - "${YAMS_PORT:-3001}:3000"
      # Minecraft server ports — one port per server you plan to run.
      - "25565-25665:25565-25665"
    volumes:
      - yams-data:/app/data      # yams.db + SQLite WAL files
      - yams-servers:/app/servers # server JARs, worlds, configs, backups
    environment:
      NODE_ENV: production
      PORT: 3000
      # Bridge mode: the container must accept connections from Docker's bridge
      # interface, so BIND_ADDRESS must be 0.0.0.0 inside the container.
      BIND_ADDRESS: "0.0.0.0"
      YAMS_AUTH_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      YAMS_ADMIN_USERNAME: ${YAMS_ADMIN_USERNAME}
      YAMS_ADMIN_PASSWORD: ${YAMS_ADMIN_PASSWORD}
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  yams-data:
  yams-servers:
