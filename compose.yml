services:
  yams:
    build: .
    # host networking lets Minecraft servers bind their ports (25565, 25566, …)
    # without declaring a fixed port range in advance.
    network_mode: host
    volumes:
      - yams-data:/app/data      # yams.db + SQLite WAL files
      - yams-servers:/app/servers # server JARs, worlds, configs, backups
    environment:
      NODE_ENV: production
      PORT: 3000
      # Binds to localhost only by default — access YAMS from the same machine.
      # Set BIND_ADDRESS=0.0.0.0 (via .env) to expose it on the network,
      # then put a TLS reverse-proxy (Caddy, nginx) in front of it.
      BIND_ADDRESS: ${BIND_ADDRESS:-127.0.0.1}
      YAMS_AUTH_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
      YAMS_ADMIN_USERNAME: ${YAMS_ADMIN_USERNAME}
      YAMS_ADMIN_PASSWORD: ${YAMS_ADMIN_PASSWORD}
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  yams-data:
  yams-servers:
